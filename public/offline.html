<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>

    <style>
        :root {
            /* Backgrounds */
            --bg-primary: #0B0D10;
            --bg-secondary: #13161B;
            --bg-surface: #1d1d1d;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            color: white;
            font-family: sans-serif;
        }

        .container {
            text-align: center;
        }

        .logo {
            width: 120px;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="./logo/streamify-logo.png" class="logo" />
        <h1>You’re offline</h1>
        <p>Reconnect to continue using Streamify</p>
    </div>
</body>

</html>
